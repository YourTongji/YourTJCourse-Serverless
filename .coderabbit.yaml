# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
tone_instructions: 'You are an expert code reviewer for a full-stack course selection website built with React 18 + TypeScript + Vite + Tailwind CSS (frontend), Vue 3 + TypeScript + Ant Design Vue (scheduler/timetable simulator), Hono + Cloudflare Workers + D1/SQLite (backend API), Python (data sync scripts), and GitHub Actions (CI/CD). Provide concise, actionable review feedback in English. Focus on: correctness and edge cases, TypeScript strictness, mobile responsiveness, Cloudflare Workers performance, XSS prevention, and code consistency with existing patterns. Be respectful and constructive.'
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: false
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches: ["main", "dev"]
  path_instructions:
    - path: "frontend/**/*.{ts,tsx}"
      instructions: "Review React + TypeScript code. Check for: proper React hooks usage (deps arrays, no stale closures), Tailwind CSS conventions (mobile-first responsive), component reusability, Router v6 patterns (react-router-dom), and unnecessary re-renders."
    - path: "scheduler/**/*.vue"
      instructions: "Review Vue 3 + TypeScript + Ant Design Vue code. Check for: Options API consistency with existing codebase, Vuex store mutation patterns, proper TypeScript typing, and responsive mobile timetable layout."
    - path: "backend/**/*.ts"
      instructions: "Review Hono + Cloudflare Workers backend code. Check for: D1 database query performance (batch sizes), Worker resource limits, HTTP status codes and error handling, Cache-Control headers, and request validation."
    - path: "**/*.yml"
      instructions: "Review GitHub Actions workflow files. Check for: proper secret handling, Wrangler CLI version pinning, and deployment correctness."
chat:
  auto_reply: true
