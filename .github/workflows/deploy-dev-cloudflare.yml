name: Deploy Dev (Cloudflare)

on:
  push:
    branches: ["dev"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "scheduler/**"
      - "wlc/**"
      - ".github/workflows/deploy-dev-cloudflare.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.decide.outputs.backend }}
      frontend: ${{ steps.decide.outputs.frontend }}
      scheduler: ${{ steps.decide.outputs.scheduler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/deploy-dev-cloudflare.yml"
            frontend:
              - "frontend/**"
              - "wlc/**"
              - ".github/workflows/deploy-dev-cloudflare.yml"
            scheduler:
              - "scheduler/**"

      - name: Decide what to deploy
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "scheduler=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
          echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          echo "scheduler=${{ steps.filter.outputs.scheduler }}" >> "$GITHUB_OUTPUT"

  deploy-backend-dev:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ADMIN_SECRET: ${{ secrets.JCOURSE_ADMIN_SECRET }}
      CREDIT_API_BASE: ${{ secrets.CREDIT_API_BASE }}
      VITE_CREDIT_API_BASE: ${{ secrets.VITE_CREDIT_API_BASE }}
      CREDIT_JCOURSE_SECRET: ${{ secrets.CREDIT_JCOURSE_SECRET }}
      JCOURSE_INTEGRATION_SECRET: ${{ secrets.JCOURSE_INTEGRATION_SECRET }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      TURNSTILE_SITEVERIFY_URL: ${{ secrets.TURNSTILE_SITEVERIFY_URL }}
      AI_SUMMARY_KEY: ${{ secrets.AI_SUMMARY_KEY }}
      AI_SUMMARY_MODEL: ${{ secrets.AI_SUMMARY_MODEL }}
      AI_SUMMARY_BASE_URL: ${{ secrets.AI_SUMMARY_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci

      - name: Apply backend migrations (env.dev)
        run: |
          set -euo pipefail
          npx wrangler d1 execute jcourse-db --remote --env dev --file="./migrations/015_ai_summaries.sql"

      - name: Ensure backend secrets (env.dev)
        run: |
          set -euo pipefail
          if [ -z "$ADMIN_SECRET" ]; then
            echo "Missing secrets.JCOURSE_ADMIN_SECRET (used as backend ADMIN_SECRET)" >&2
            exit 1
          fi
          echo "$ADMIN_SECRET" | npx wrangler versions secret put ADMIN_SECRET --env dev
          BASE="${CREDIT_API_BASE:-${VITE_CREDIT_API_BASE:-}}"
          SECRET="${CREDIT_JCOURSE_SECRET:-${JCOURSE_INTEGRATION_SECRET:-}}"

          if [ -n "${BASE:-}" ]; then
            echo "$BASE" | npx wrangler versions secret put CREDIT_API_BASE --env dev
            echo "$BASE" | npx wrangler versions secret put VITE_CREDIT_API_BASE --env dev
            echo "credit base: set (dev)"
          else
            echo "credit base: missing (dev)"
          fi

          if [ -n "${SECRET:-}" ]; then
            echo "$SECRET" | npx wrangler versions secret put CREDIT_JCOURSE_SECRET --env dev
            echo "$SECRET" | npx wrangler versions secret put JCOURSE_INTEGRATION_SECRET --env dev
            echo "credit secret: set (dev)"
          else
            echo "credit secret: missing (dev)"
          fi

          if [ -n "${TURNSTILE_SECRET_KEY:-}" ]; then
            echo "$TURNSTILE_SECRET_KEY" | npx wrangler versions secret put TURNSTILE_SECRET_KEY --env dev
            echo "turnstile secret: set (dev)"
          else
            echo "turnstile secret: missing (dev)"
          fi

          if [ -n "${TURNSTILE_SITEVERIFY_URL:-}" ]; then
            echo "$TURNSTILE_SITEVERIFY_URL" | npx wrangler versions secret put TURNSTILE_SITEVERIFY_URL --env dev
            echo "turnstile siteverify url: set (dev)"
          else
            echo "turnstile siteverify url: default (dev)"
          fi

          if [ -n "${AI_SUMMARY_KEY:-}" ]; then
            echo "$AI_SUMMARY_KEY" | npx wrangler versions secret put AI_SUMMARY_KEY --env dev
            echo "ai summary key: set (dev)"
          else
            echo "ai summary key: missing (dev)"
          fi

          if [ -n "${AI_SUMMARY_MODEL:-}" ]; then
            echo "$AI_SUMMARY_MODEL" | npx wrangler versions secret put AI_SUMMARY_MODEL --env dev
            echo "ai summary model: set (dev)"
          else
            echo "ai summary model: missing (dev)"
          fi

          if [ -n "${AI_SUMMARY_BASE_URL:-}" ]; then
            echo "$AI_SUMMARY_BASE_URL" | npx wrangler versions secret put AI_SUMMARY_BASE_URL --env dev
            echo "ai summary base url: set (dev)"
          else
            echo "ai summary base url: missing (dev)"
          fi

      - name: Deploy Worker (env.dev)
        run: npx wrangler deploy --env dev

      - name: Refresh review search index (env.dev)
        run: |
          set -euo pipefail
          npx wrangler d1 execute jcourse-db --remote --env dev --file="./migrations/001_pk_schema.sql"
          npx wrangler d1 execute jcourse-db --remote --env dev --file="./migrations/010_materialize_courses_from_pk.sql"
          cat > .tmp-refresh-review-index.sql <<'SQL'
          CREATE TABLE IF NOT EXISTS course_semesters (
            course_id INTEGER PRIMARY KEY,
            semester_names TEXT DEFAULT ''
          );
          CREATE INDEX IF NOT EXISTS idx_course_semesters_course_id ON course_semesters(course_id);
          CREATE VIRTUAL TABLE IF NOT EXISTS course_search USING fts5(course_id UNINDEXED, search_doc, tokenize='trigram');

          DELETE FROM course_semesters;
          WITH
            course_codes AS (
              SELECT id AS course_id, TRIM(code) AS code
              FROM courses
              WHERE TRIM(COALESCE(code, '')) != ''
              UNION
              SELECT course_id, TRIM(alias) AS code
              FROM course_aliases
              WHERE system = 'onesystem' AND TRIM(COALESCE(alias, '')) != ''
            ),
            semester_rows AS (
              SELECT cc.course_id, ca.calendarIdI18n AS name, ca.calendarId
              FROM course_codes cc
              JOIN coursedetail cd ON cd.courseCode = cc.code
              JOIN calendar ca ON ca.calendarId = cd.calendarId
              UNION ALL
              SELECT cc.course_id, ca.calendarIdI18n AS name, ca.calendarId
              FROM course_codes cc
              JOIN coursedetail cd ON cd.code = cc.code
              JOIN calendar ca ON ca.calendarId = cd.calendarId
              UNION ALL
              SELECT cc.course_id, ca.calendarIdI18n AS name, ca.calendarId
              FROM course_codes cc
              JOIN coursedetail cd ON cd.newCourseCode = cc.code
              JOIN calendar ca ON ca.calendarId = cd.calendarId
              UNION ALL
              SELECT cc.course_id, ca.calendarIdI18n AS name, ca.calendarId
              FROM course_codes cc
              JOIN coursedetail cd ON cd.newCode = cc.code
              JOIN calendar ca ON ca.calendarId = cd.calendarId
            ),
            semester_ranked AS (
              SELECT course_id, TRIM(name) AS name, MAX(calendarId) AS calendarId
              FROM semester_rows
              WHERE TRIM(COALESCE(name, '')) != ''
              GROUP BY course_id, TRIM(name)
            )
          INSERT INTO course_semesters (course_id, semester_names)
          SELECT
            c.id,
            COALESCE((
              SELECT GROUP_CONCAT(name, '||')
              FROM (
                SELECT sr.name
                FROM semester_ranked sr
                WHERE sr.course_id = c.id
                ORDER BY sr.calendarId DESC, sr.name
              )
            ), '') AS semester_names
          FROM courses c;

          DELETE FROM course_search;
          WITH
            alias_keywords AS (
              SELECT course_id, GROUP_CONCAT(DISTINCT TRIM(alias)) AS aliases
              FROM course_aliases
              WHERE system = 'onesystem' AND TRIM(COALESCE(alias, '')) != ''
              GROUP BY course_id
            ),
            course_codes AS (
              SELECT id AS course_id, TRIM(code) AS code
              FROM courses
              WHERE TRIM(COALESCE(code, '')) != ''
              UNION
              SELECT course_id, TRIM(alias) AS code
              FROM course_aliases
              WHERE system = 'onesystem' AND TRIM(COALESCE(alias, '')) != ''
            ),
            pk_rows AS (
              SELECT cc.course_id, cd.*
              FROM course_codes cc
              JOIN coursedetail cd ON cd.courseCode = cc.code
              UNION ALL
              SELECT cc.course_id, cd.*
              FROM course_codes cc
              JOIN coursedetail cd ON cd.code = cc.code
              UNION ALL
              SELECT cc.course_id, cd.*
              FROM course_codes cc
              JOIN coursedetail cd ON cd.newCourseCode = cc.code
              UNION ALL
              SELECT cc.course_id, cd.*
              FROM course_codes cc
              JOIN coursedetail cd ON cd.newCode = cc.code
            ),
            pk_keywords AS (
              SELECT
                pr.course_id,
                TRIM(
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(pr.courseCode)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(pr.code)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(pr.newCourseCode)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(pr.newCode)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(pr.courseName)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(pr.name)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(pr.faculty)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(pr.campus)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(t.teacherCode)), '') || ' ' ||
                  COALESCE(GROUP_CONCAT(DISTINCT TRIM(t.teacherName)), '')
                ) AS keywords
              FROM pk_rows pr
              LEFT JOIN teacher t ON t.teachingClassId = pr.id
              GROUP BY pr.course_id
            )
          INSERT INTO course_search (course_id, search_doc)
          SELECT
            c.id,
            TRIM(
              c.code || ' ' ||
              c.name || ' ' ||
              COALESCE(c.department, '') || ' ' ||
              COALESCE(t.name, '') || ' ' ||
              COALESCE(t.tid, '') || ' ' ||
              COALESCE(c.search_keywords, '') || ' ' ||
              COALESCE(ak.aliases, '') || ' ' ||
              COALESCE(pk.keywords, '')
            ) AS search_doc
          FROM courses c
          LEFT JOIN teachers t ON t.id = c.teacher_id
          LEFT JOIN alias_keywords ak ON ak.course_id = c.id
          LEFT JOIN pk_keywords pk ON pk.course_id = c.id;

          INSERT OR REPLACE INTO settings (key, value)
          VALUES ('aux_schema_version', '20260609-pk-materialize-v1');
          SQL
          npx wrangler d1 execute jcourse-db --remote --env dev --file=".tmp-refresh-review-index.sql"

  deploy-frontend-dev:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.scheduler == 'true'
    defaults:
      run:
        working-directory: frontend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # dev 分支预览站点指向 dev 后端（Worker env.dev）
      VITE_API_URL: ${{ secrets.BACKEND_URL_DEV }}
      VITE_APP_ENV: dev
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
      VITE_CAPTCHA_URL: ${{ secrets.VITE_CAPTCHA_URL }}
      VITE_WALINE_SERVER_URL: ${{ secrets.VITE_WALINE_SERVER_URL }}
      VITE_CREDIT_API_BASE: ${{ secrets.VITE_CREDIT_API_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci

      - name: Install scheduler deps
        working-directory: scheduler
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy Pages (preview branch=dev)
        run: npx wrangler pages deploy dist --project-name jcourse-web --branch dev
