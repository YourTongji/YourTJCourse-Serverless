name: Sync Onesystem (Cookie) To D1

on:
  workflow_dispatch:
    inputs:
      calendarId:
        description: "一系统学期ID (例如 121)"
        required: true
        type: string
      depth:
        description: "同步深度 (从 calendarId 往前同步多少学期，默认 1)"
        required: false
        default: "1"
        type: string
  push:
    branches: ["dev"]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[pk-sync-cookie]'))
    steps:
      - name: Deprecated workflow
        run: |
          set -euo pipefail
          echo "This workflow is deprecated because it bypasses the backup D1 double-write path." >&2
          echo "Please use \"Sync Onesystem (Login) To D1\" instead." >&2
          exit 1
